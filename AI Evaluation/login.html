<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TimeFlow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(to bottom right, #e9d5ff, #fce7f3, #dbeafe);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Floating Background Elements */
    .bg-decoration {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
      animation: float 20s infinite ease-in-out;
    }

    .bg-decoration-1 {
      width: 300px;
      height: 300px;
      background: linear-gradient(to bottom right, #c084fc, #f472b6);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .bg-decoration-2 {
      width: 400px;
      height: 400px;
      background: linear-gradient(to bottom right, #60a5fa, #a78bfa);
      bottom: 10%;
      right: 10%;
      animation-delay: 5s;
    }

    .bg-decoration-3 {
      width: 250px;
      height: 250px;
      background: linear-gradient(to bottom right, #f472b6, #fb7185);
      top: 50%;
      right: 20%;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      25% {
        transform: translateY(-30px) translateX(20px);
      }
      50% {
        transform: translateY(-60px) translateX(-20px);
      }
      75% {
        transform: translateY(-30px) translateX(10px);
      }
    }

    /* Login Container */
    .login-container {
      position: relative;
      width: 100%;
      max-width: 440px;
      z-index: 10;
    }

    /* Logo Section */
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(to bottom right, #c084fc, #f472b6, #60a5fa);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 25px -5px rgba(192, 132, 252, 0.4);
      margin-bottom: 16px;
      animation: pulse 3s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 20px 25px -5px rgba(192, 132, 252, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 25px 30px -5px rgba(192, 132, 252, 0.5);
      }
    }

    .logo-inner {
      width: 36px;
      height: 36px;
      background: white;
      border-radius: 12px;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(to right, #9333ea, #ec4899, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .logo-tagline {
      color: #6b7280;
      font-size: 15px;
    }

    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      border-radius: 32px;
      border: 1px solid rgba(233, 213, 255, 0.8);
      padding: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
    }

    .card-glow {
      position: absolute;
      inset: -100px;
      background: linear-gradient(45deg, #c084fc, #f472b6, #60a5fa);
      opacity: 0.1;
      filter: blur(40px);
      animation: rotate 10s linear infinite;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .card-content {
      position: relative;
      z-index: 10;
    }

    .card-title {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(to right, #9333ea, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      text-align: center;
    }

    .card-subtitle {
      color: #6b7280;
      text-align: center;
      margin-bottom: 32px;
      font-size: 15px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #6b7280;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(to right, #faf5ff, #fce7f3);
      border: 1px solid #e9d5ff;
      outline: none;
      transition: all 0.3s;
      font-size: 15px;
      color: #374151;
    }

    .form-input:focus {
      box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.3);
      border-color: #c084fc;
      background: white;
    }

    .form-input::placeholder {
      color: #d8b4fe;
    }

    /* Password Input Container */
    .password-container {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #d8b4fe;
      transition: color 0.3s;
    }

    .toggle-password:hover {
      color: #c084fc;
    }

    /* Checkbox */
    .remember-forgot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-input {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 2px solid #e9d5ff;
      cursor: pointer;
      accent-color: #c084fc;
    }

    .checkbox-label {
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
    }

    .forgot-link {
      color: #9333ea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .forgot-link:hover {
      color: #ec4899;
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(to right, #a855f7, #ec4899, #3b82f6);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 25px -5px rgba(192, 132, 252, 0.5);
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(192, 132, 252, 0.6);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #e9d5ff, transparent);
    }

    .divider-text {
      color: #9ca3af;
      font-size: 14px;
    }

    /* Social Login */
    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(to right, #faf5ff, #fce7f3);
      border: 1px solid #e9d5ff;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 500;
    }

    .social-btn:hover {
      background: white;
      border-color: #c084fc;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(192, 132, 252, 0.2);
    }

    /* Sign Up Link */
    .signup-text {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .signup-link {
      color: #9333ea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .signup-link:hover {
      color: #ec4899;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
      }

      .logo-text {
        font-size: 28px;
      }

      .card-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <!-- Background Decorations -->
  <div class="bg-decoration bg-decoration-1"></div>
  <div class="bg-decoration bg-decoration-2"></div>
  <div class="bg-decoration bg-decoration-3"></div>

  <!-- Login Container -->
  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <div class="logo-inner"></div>
      </div>
      <h1 class="logo-text">TimeFlow</h1>
      <p class="logo-tagline">Track your time, beautifully</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-glow"></div>
      <div class="card-content">
        <h2 class="card-title">Welcome back! ✨</h2>
        <p class="card-subtitle">Sign in to continue tracking your time</p>

        <form id="loginForm">
          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="Enter your email"
              required
            >
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-container">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                required
              >
              <button type="button" class="toggle-password" id="togglePassword">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eyeOffIcon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember & Forgot -->
          <div class="remember-forgot">
            <div class="checkbox-group">
              <input type="checkbox" id="remember" class="checkbox-input">
              <label for="remember" class="checkbox-label">Remember me</label>
            </div>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <!-- Login Button -->
          <button type="submit" class="login-btn">Sign In</button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or continue with</span>
          <div class="divider-line"></div>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button class="social-btn" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>
          
          <button class="social-btn" id="githubBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#333">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span>GitHub</span>
          </button>
        </div>

        <!-- Sign Up Link -->
        <p class="signup-text">
          Don't have an account? <a href="#" class="signup-link">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    // Toggle Password Visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      
      eyeIcon.classList.toggle('hidden');
      eyeOffIcon.classList.toggle('hidden');
    });

    // Form Submission
    const loginForm = document.getElementById('loginForm');
    
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      
      console.log('Login attempt:', { email, password, remember });
      
      // Simulate login success
      alert('Login successful! Redirecting to dashboard...');
      
      // Redirect to dashboard
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    });

    // Social Login Buttons
    document.getElementById('googleBtn').addEventListener('click', () => {
      alert('Google login would be implemented here!');
    });

    document.getElementById('githubBtn').addEventListener('click', () => {
      alert('GitHub login would be implemented here!');
    });

    // Hide class helper
    const style = document.createElement('style');
    style.textContent = '.hidden { display: none !important; }';
    document.head.appendChild(style);
  </script>
</body>
</html>
